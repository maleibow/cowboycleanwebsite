<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cowboy Clean - Instagram Edition</title>
    <style>
        body, html {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            overflow: hidden !important;
            background-color: #000 !important;
            touch-action: none;
        }

        #device-wrapper {
            position: fixed !important;
            top: 0;
            left: 0;
            z-index: 2147483647 !important; /* Max z-index to cover the rest of the website */
            transform-origin: 0 0;
            background: #000;
        }

        iframe {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
            display: block !important;
        }
    </style>
</head>
<body>
    <div id="device-wrapper">
        <iframe src="index.html?ignore_rotation=1" allowfullscreen></iframe>
    </div>
    <script>
        function resize() {
            var wrapper = document.getElementById('device-wrapper');
            
            // Force it to be a direct child of body to escape CMS wrappers
            if (wrapper.parentNode && wrapper.parentNode !== document.body) {
                document.body.appendChild(wrapper);
            }
            
            // Hide all other direct body children (CMS headers/footers)
            var children = document.body.children;
            for (var i = 0; i < children.length; i++) {
                var child = children[i];
                if (child !== wrapper && child.tagName !== 'SCRIPT' && child.tagName !== 'STYLE') {
                    child.style.display = 'none';
                }
            }

            var w = window.innerWidth;
            var h = window.innerHeight;
            
            // If they are in portrait mode (width < height)
            if (w < h) {
                // Rotate 90 degrees clockwise
                wrapper.style.width = h + 'px';
                wrapper.style.height = w + 'px';
                wrapper.style.top = '0px';
                wrapper.style.left = w + 'px';
                wrapper.style.transform = 'rotate(90deg)';
            } else {
                // If they are in landscape mode, no need to rotate
                wrapper.style.width = w + 'px';
                wrapper.style.height = h + 'px';
                wrapper.style.top = '0px';
                wrapper.style.left = '0px';
                wrapper.style.transform = 'none';
            }
        }
        
        window.addEventListener('resize', resize);
        // Sometimes innerHeight changes after a slight delay on mobile
        setTimeout(resize, 100);
        setTimeout(resize, 500);
        resize();
    </script>
</body>
</html>
